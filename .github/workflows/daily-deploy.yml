name: Daily Render Deploy

on:
  schedule:
    # Once per day at 01:00 UTC — refreshes BTC data on qibble.io
    - cron: "0 1 * * *"
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update timestamp to bust Docker cache
        run: |
          date -u > .last-deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-deploy
          git commit -m "Daily data refresh"
          git push

name: Update BTC Data

on:
  schedule:
    # Run daily at 01:00 UTC (after full UTC day completes)
    - cron: "0 1 * * *"
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pandas numpy pyarrow

      - name: Run ingestion (incremental)
        run: python ingest_btc.py

      - name: Push updated parquet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/btc_1m.parquet
          git diff --staged --quiet || git commit -m "Update BTC data $(date -u +%Y-%m-%d)"
          git push

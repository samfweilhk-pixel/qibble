<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ tag }} — {{ total }} BTC Flow Days | Qibble</title>
    <meta name="description" content="{{ tag_description }} Browse {{ total }} days with this pattern in Bitcoin order flow data.">
    <link rel="canonical" href="https://qibble.io/btc-flow/tag/{{ tag }}/">

    <meta property="og:title" content="{{ tag }} — {{ total }} BTC Flow Days">
    <meta property="og:description" content="{{ tag_description }}">
    <meta property="og:url" content="https://qibble.io/btc-flow/tag/{{ tag }}/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:site" content="@qibbler">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-R0JQN19Z3W"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-R0JQN19Z3W');
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f; color: #e5e5e5;
            font-family: 'JetBrains Mono', monospace; line-height: 1.7; min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 0; border-bottom: 1px solid #1e1e2e; margin-bottom: 32px;
        }
        nav a { color: #00d4ff; text-decoration: none; font-size: 13px; }
        nav a:hover { text-decoration: underline; }
        .nav-logo { font-size: 18px; font-weight: 700; color: #00d4ff; letter-spacing: 2px; text-transform: uppercase; }
        .nav-links { display: flex; gap: 20px; }
        h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 8px; }
        .tag-badge {
            display: inline-block; background: rgba(0,212,255,0.1); color: #00d4ff;
            padding: 4px 12px; border-radius: 4px; font-size: 14px; font-weight: 600;
            border: 1px solid rgba(0,212,255,0.3); margin-right: 8px;
        }
        .subtitle { font-size: 12px; color: #888; margin-bottom: 8px; }
        .description { font-size: 13px; color: #ccc; margin-bottom: 24px; }

        .other-tags {
            margin-bottom: 24px; padding: 16px;
            background: rgba(17,17,24,0.5); border: 1px solid #1e1e2e; border-radius: 8px;
        }
        .other-tags-label { font-size: 10px; color: #7c3aed; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .other-tags a {
            display: inline-block; background: #1e1e2e; color: #888; padding: 3px 8px;
            border-radius: 3px; font-size: 10px; text-decoration: none; margin: 2px;
            border: 1px solid #2a2d3e;
        }
        .other-tags a:hover { color: #00d4ff; border-color: #00d4ff; }

        .day-list { display: grid; gap: 6px; }
        .day-row {
            display: grid; grid-template-columns: 100px 60px 80px 1fr;
            align-items: center; gap: 12px; padding: 8px 12px;
            background: rgba(17,17,24,0.5); border: 1px solid #1e1e2e; border-radius: 6px;
            text-decoration: none; transition: border-color 0.2s;
        }
        .day-row:hover { border-color: #00d4ff; }
        .day-date { color: #fff; font-size: 12px; font-weight: 500; }
        .day-regime { font-size: 10px; font-weight: 700; }
        .day-regime.bull { color: #34d399; }
        .day-regime.bear { color: #f87171; }
        .day-regime.chop { color: #fbbf24; }
        .day-return { font-size: 12px; font-weight: 500; }
        .day-return.pos { color: #34d399; }
        .day-return.neg { color: #f87171; }
        .day-hook { font-size: 10px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        footer {
            text-align: center; padding: 32px 0; border-top: 1px solid #1e1e2e; margin-top: 32px;
        }
        footer p { font-size: 11px; color: #555; }
        footer a { color: #00d4ff; text-decoration: none; }

        @media (max-width: 640px) {
            .day-row { grid-template-columns: 90px 50px 70px; }
            .day-hook { display: none; }
            h1 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="https://qibble.io" class="nav-logo">Qibble</a>
            <div class="nav-links">
                <a href="https://qibble.io">Dashboard</a>
                <a href="/btc-flow/">All Days</a>
            </div>
        </nav>

        <h1><span class="tag-badge">{{ tag }}</span> {{ total }} days</h1>
        <p class="description">{{ tag_description }}</p>

        <div class="other-tags">
            <div class="other-tags-label">All patterns</div>
            {% for t in all_tags %}
            <a href="/btc-flow/tag/{{ t }}/" {% if t == tag %}style="color:#00d4ff;border-color:#00d4ff;"{% endif %}>{{ t }}</a>
            {% endfor %}
        </div>

        <div class="day-list">
            {% for e in entries %}
            <a href="/btc-flow/{{ e.date }}/" class="day-row">
                <span class="day-date">{{ e.date }}</span>
                <span class="day-regime {{ e.regime|lower }}">{{ e.regime }}</span>
                <span class="day-return {% if e.return_pct > 0 %}pos{% elif e.return_pct < 0 %}neg{% endif %}">{{ "%.2f"|format(e.return_pct) }}%</span>
                <span class="day-hook">{{ e.hook }}</span>
            </a>
            {% endfor %}
        </div>

        <footer>
            <p>
                <a href="https://qibble.io">Qibble</a> &middot;
                Free BTC flow analytics &middot;
                <a href="https://x.com/qibbler">@qibbler</a>
            </p>
        </footer>
    </div>
</body>
</html>
